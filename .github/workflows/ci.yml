name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client-tests:
    name: Client Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Merchello/Client/package-lock.json

      - name: Install dependencies
        working-directory: src/Merchello/Client
        run: npm ci

      - name: Run client tests
        working-directory: src/Merchello/Client
        run: npm run test:run

  dotnet-tests:
    name: .NET Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore src/Merchello.sln

      - name: Build solution
        run: dotnet build src/Merchello.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test src/Merchello.Tests/Merchello.Tests.csproj -c Release --no-build --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx

  publish-nuget:
    name: Publish NuGet
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [client-tests, dotnet-tests]
    runs-on: ubuntu-latest
    concurrency:
      group: nuget-release-main
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Determine release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          existing_tag="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
          if [[ -n "${existing_tag}" ]]; then
            echo "tag_already_exists=true" >> "$GITHUB_OUTPUT"
            echo "tag=${existing_tag}" >> "$GITHUB_OUTPUT"
            echo "version=${existing_tag#v}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
          if [[ -z "${latest_tag}" ]]; then
            version="0.1.0"
          else
            base_version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${base_version}"
            version="${major}.${minor}.$((patch + 1))"
          fi

          tag="v${version}"
          echo "tag_already_exists=false" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        if: steps.version.outputs.tag_already_exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Build and create NuGet packages
        shell: bash
        run: |
          set -euo pipefail
          dotnet build src/Merchello/Merchello.csproj -c Release /p:Version=${{ steps.version.outputs.version }}

      - name: Prepare and pack starter site template
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TEMPLATE_DIR="src/Merchello.StarterSite.Template/content/Merchello.Site"

          rm -rf src/Merchello.StarterSite.Template/content
          mkdir -p "${TEMPLATE_DIR}"

          rsync -a \
            --exclude='bin/' --exclude='obj/' --exclude='.vs/' \
            --exclude='Properties/launchSettings.json' \
            --exclude='appsettings.Development.json' \
            --exclude='appsettings-schema.json' \
            --exclude='appsettings-schema.*.json' \
            --exclude='umbraco-package-schema.json' \
            --exclude='umbraco/Data/TEMP/' \
            --exclude='umbraco/Data/*.sqlite.db' \
            --exclude='umbraco/Data/*.sqlite.db-shm' \
            --exclude='umbraco/Data/*.sqlite.db-wal' \
            --exclude='umbraco/Logs/' \
            --exclude='wwwroot/media/' \
            --exclude='App_Data/' \
            --exclude='.gitignore' \
            src/Merchello.Site/ "${TEMPLATE_DIR}/"

          # Replace ProjectReference with PackageReference
          sed -i 's|<ProjectReference Include="\.\.\\Merchello\\Merchello\.csproj" />|<PackageReference Include="Umbraco.Community.Merchello" Version="'"${VERSION}"'" />|' \
            "${TEMPLATE_DIR}/Merchello.Site.csproj"

          # Remove _ContentIncludedByDefault items
          sed -i '/<_ContentIncludedByDefault Remove=/d' \
            "${TEMPLATE_DIR}/Merchello.Site.csproj"

          # Remove empty Folder includes
          sed -i '/<Folder Include="Home\\" \/>/d' \
            "${TEMPLATE_DIR}/Merchello.Site.csproj"

          # Clean up empty ItemGroup blocks
          perl -0777 -i -pe 's|\s*<ItemGroup>\s*</ItemGroup>||g' \
            "${TEMPLATE_DIR}/Merchello.Site.csproj"

          # Remove Umbraco instance ID and Unattended install section from appsettings
          python3 -c "
          import json
          with open('${TEMPLATE_DIR}/appsettings.json', 'r') as f:
              config = json.load(f)
          if 'Umbraco' in config and 'CMS' in config['Umbraco']:
              cms = config['Umbraco']['CMS']
              if 'Global' in cms and 'Id' in cms['Global']:
                  del cms['Global']['Id']
              if 'Unattended' in cms:
                  del cms['Unattended']
          with open('${TEMPLATE_DIR}/appsettings.json', 'w') as f:
              json.dump(config, f, indent=2)
              f.write('\n')
          "

          dotnet pack src/Merchello.StarterSite.Template/Merchello.StarterSite.Template.csproj \
            -c Release \
            /p:Version="${VERSION}" \
            --output src/Merchello.StarterSite.Template/bin/Release

      - name: Push packages to NuGet.org
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t packages < <(find src -type f -path "*/bin/Release/*.nupkg")
          if [[ "${#packages[@]}" -eq 0 ]]; then
            echo "No NuGet packages were created."
            exit 1
          fi

          for package in "${packages[@]}"; do
            dotnet nuget push "${package}" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate
          done
