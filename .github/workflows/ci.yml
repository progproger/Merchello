name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client-tests:
    name: Client Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Merchello/Client/package-lock.json

      - name: Install dependencies
        working-directory: src/Merchello/Client
        run: npm ci

      - name: Run client tests
        working-directory: src/Merchello/Client
        run: npm run test:run

  dotnet-tests:
    name: .NET Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore src/Merchello.sln

      - name: Build solution
        run: dotnet build src/Merchello.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test src/Merchello.Tests/Merchello.Tests.csproj -c Release --no-build --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx
