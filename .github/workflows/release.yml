name: Release Package (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (example: 1.0.0)"
        required: true
        type: string
      ref:
        description: "Git ref to release from (default: main)"
        required: false
        default: "main"
        type: string

jobs:
  publish-nuget:
    name: Publish NuGet (Manual)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: nuget-release-manual
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate version and tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must be semver-like, for example 1.0.0 or 1.0.0-rc.1"
            exit 1
          fi

          tag="v${version}"
          git fetch --tags --force

          existing_tag_commit="$(git rev-list -n 1 "${tag}" 2>/dev/null || true)"
          head_commit="$(git rev-parse HEAD)"

          if [[ -n "${existing_tag_commit}" && "${existing_tag_commit}" != "${head_commit}" ]]; then
            echo "Tag ${tag} already exists on a different commit (${existing_tag_commit})."
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if [[ -n "${existing_tag_commit}" ]]; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push release tag
        if: steps.release.outputs.tag_exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.release.outputs.tag }}"
          git push origin "${{ steps.release.outputs.tag }}"

      - name: Build and create NuGet packages
        shell: bash
        run: |
          set -euo pipefail
          dotnet build src/Merchello/Merchello.csproj -c Release /p:Version=${{ steps.release.outputs.version }}

      - name: Prepare and pack starter site template
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.release.outputs.version }}"
          CONTENT_DIR="src/Merchello.StarterSite.Template/content"
          PROJECT_DIR="${CONTENT_DIR}/Merchello.Site.Web"

          rm -rf "${CONTENT_DIR}"
          mkdir -p "${PROJECT_DIR}"

          # Copy project files into .Web subfolder
          rsync -a \
            --exclude='bin/' --exclude='obj/' --exclude='.vs/' \
            --exclude='.template.config/' \
            --exclude='appsettings.Development.json' \
            --exclude='appsettings-schema.json' \
            --exclude='appsettings-schema.*.json' \
            --exclude='umbraco-package-schema.json' \
            --exclude='umbraco/Data/TEMP/' \
            --exclude='umbraco/Data/*.sqlite.db' \
            --exclude='umbraco/Data/*.sqlite.db-shm' \
            --exclude='umbraco/Data/*.sqlite.db-wal' \
            --exclude='umbraco/Logs/' \
            --exclude='wwwroot/media/' \
            --exclude='App_Data/' \
            --exclude='.gitignore' \
            src/Merchello.Site/ "${PROJECT_DIR}/"

          # Copy .template.config to content root (solution level)
          cp -r src/Merchello.Site/.template.config "${CONTENT_DIR}/.template.config"

          # Create .slnx solution file at content root
          printf '<Solution>\n  <Project Path="Merchello.Site.Web/Merchello.Site.Web.csproj" />\n</Solution>\n' \
            > "${CONTENT_DIR}/Merchello.Site.slnx"

          # Rename .csproj to include .Web suffix
          mv "${PROJECT_DIR}/Merchello.Site.csproj" "${PROJECT_DIR}/Merchello.Site.Web.csproj"

          # Rename launch profile to match template project name
          sed -i 's/"Umbraco.Web.UI"/"Merchello.Site.Web"/' \
            "${PROJECT_DIR}/Properties/launchSettings.json"

          # Rewrite namespaces: Merchello.Site. -> Merchello.Site.Web. in .cs and .cshtml files
          find "${PROJECT_DIR}" \( -name '*.cs' -o -name '*.cshtml' \) -exec \
            sed -i 's/Merchello\.Site\./Merchello.Site.Web./g' {} +

          # Strip Windows carriage returns so sed patterns match reliably
          sed -i 's/\r$//' "${PROJECT_DIR}/Merchello.Site.Web.csproj"

          # Replace ProjectReference with PackageReference
          sed -i 's|<ProjectReference Include="\.\.\\Merchello\\Merchello\.csproj"\s*/>|<PackageReference Include="Umbraco.Community.Merchello" Version="'"${VERSION}"'" />|' \
            "${PROJECT_DIR}/Merchello.Site.Web.csproj"

          # Verify replacement succeeded
          if grep -q "Umbraco.Community.Merchello" "${PROJECT_DIR}/Merchello.Site.Web.csproj"; then
            echo "✓ PackageReference to Umbraco.Community.Merchello added"
          else
            echo "ERROR: Failed to add PackageReference to Umbraco.Community.Merchello"
            exit 1
          fi

          # Remove _ContentIncludedByDefault items
          sed -i '/<_ContentIncludedByDefault Remove=/d' \
            "${PROJECT_DIR}/Merchello.Site.Web.csproj"

          # Remove empty Folder includes
          sed -i '/<Folder Include="Home\\" \/>/d' \
            "${PROJECT_DIR}/Merchello.Site.Web.csproj"

          # Clean up empty ItemGroup blocks
          perl -0777 -i -pe 's|\s*<ItemGroup>\s*</ItemGroup>||g' \
            "${PROJECT_DIR}/Merchello.Site.Web.csproj"

          # Remove Umbraco instance ID and Unattended install section from appsettings
          python3 -c "
          import json
          with open('${PROJECT_DIR}/appsettings.json', 'r') as f:
              config = json.load(f)
          if 'Umbraco' in config and 'CMS' in config['Umbraco']:
              cms = config['Umbraco']['CMS']
              if 'Global' in cms and 'Id' in cms['Global']:
                  del cms['Global']['Id']
              if 'Unattended' in cms:
                  del cms['Unattended']
          with open('${PROJECT_DIR}/appsettings.json', 'w') as f:
              json.dump(config, f, indent=2)
              f.write('\n')
          "

          dotnet pack src/Merchello.StarterSite.Template/Merchello.StarterSite.Template.csproj \
            -c Release \
            /p:Version="${VERSION}" \
            --output src/Merchello.StarterSite.Template/bin/Release

      - name: Push packages to NuGet.org
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t packages < <(find src -type f -path "*/bin/Release/*.nupkg")
          if [[ "${#packages[@]}" -eq 0 ]]; then
            echo "No NuGet packages were created."
            exit 1
          fi

          for package in "${packages[@]}"; do
            dotnet nuget push "${package}" \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate
          done
